<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dettaglio festa - Gestione</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/admin-common.js" defer></script>
  <script src="/static/festa_detail.js" defer></script>
</head>
<body>
  <main id="admin-content" class="admin-content hidden">

    <!-- Intestazione festa -->
    <section class="card">
      <div class="card-head">
        <h2 id="event-name">Festa</h2>
        <div>
          <button id="btn-toggle-open" class="btn btn-small" type="button"></button>
          <button id="btn-delete-event" class="btn btn-small btn-danger" type="button">Elimina festa</button>
          <a href="/admin/feste" class="btn btn-small btn-secondary">← Tutte le feste</a>
        </div>
      </div>
      <p><span id="event-status" class="event-badge"></span>
         <span id="event-meta" class="hint"></span></p>
    </section>

    <!-- Prodotti della festa -->
    <section class="card">
      <div class="card-head">
        <h2>Prodotti della festa</h2>
        <button id="btn-new-product" class="btn btn-print" type="button">+ Aggiungi prodotto</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Ordine</th>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Prezzo</th>
              <th>Attivo</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="6">Caricamento...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Dashboard della festa -->
    <section class="card">
      <div class="card-head">
        <h2>Dashboard</h2>
        <button id="btn-refresh-summary" class="btn btn-small btn-secondary" type="button">Aggiorna</button>
      </div>

      <div class="kpi-row">
        <div class="kpi">
          <span class="kpi-value" id="kpi-orders">—</span>
          <span class="kpi-label">Ordini</span>
        </div>
        <div class="kpi">
          <span class="kpi-value" id="kpi-revenue">—</span>
          <span class="kpi-label">Incasso totale</span>
        </div>
      </div>

      <div class="dash-grid">
        <div class="chart-card">
          <h3>Prodotti più venduti</h3>
          <div id="chart-products" class="barchart"><p class="hint">Caricamento…</p></div>
        </div>
        <div class="chart-card">
          <h3>Andamento ordini nel tempo</h3>
          <div id="chart-timeseries" class="timeseries"><p class="hint">Caricamento…</p></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Modale: nuovo/modifica prodotto -->
  <div id="product-modal" class="modal-overlay">
    <div class="modal">
      <h3 id="product-form-title">Nuovo prodotto</h3>
      <form id="product-form" class="form-grid">
        <input type="hidden" id="product-id" />
        <label>Nome <input id="p-name" type="text" required /></label>
        <label>Categoria <input id="p-category" type="text" value="Generale" /></label>
        <label>Prezzo (euro) <input id="p-price" type="number" min="0" step="0.01" required /></label>
        <label>Ordinamento <input id="p-sort" type="number" step="1" value="0" /></label>
        <label class="checkbox-label"><input id="p-active" type="checkbox" checked /> Attivo</label>
        <div class="form-actions full">
          <button class="btn btn-print" type="submit">Salva prodotto</button>
          <button id="p-cancel" class="btn btn-cancel" type="button">Annulla</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
