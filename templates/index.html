<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cassa Festa - Ultra Veloce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
    theme: {
    extend: {
    animation: {
    'slide-in': 'slideIn 0.3s ease-out',
    'bounce-in': 'bounceIn 0.5s ease-out',
    }
    }
    }
    }
    </script>
    <style>
    @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.05); }
    70% { transform: scale(0.9); }
    100% { transform: scale(1); opacity: 1; }
    }
    .toast {
    animation: bounceIn 0.5s ease-out;
    }
    
    /* Ottimizzazioni per click rapidi */
    .product-card {
        transition: all 0.05s ease;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        touch-action: manipulation;
    }
    
    .product-card:active {
        background-color: #3b82f6 !important;
        color: white !important;
        border-color: #1d4ed8 !important;
        transform: scale(0.95);
    }
    
    .quick-btn {
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        transition: transform 0.05s ease;
    }
    
    .quick-btn:active {
        transform: scale(0.95);
    }
    
    .delete-btn {
        transition: all 0.05s ease;
        min-width: 24px;
        min-height: 24px;
    }
    
    .delete-btn:hover {
        transform: scale(1.1);
    }
    
    .delete-btn:active {
        transform: scale(0.9);
    }
    
    /* Header fisso con ordine */
    .header-ordine {
        position: sticky;
        top: 0;
        z-index: 30;
        backdrop-filter: blur(10px);
    }
    
    .prodotti-selezionati {
        max-height: 40px;
        overflow-y: auto;
    }
    
    .prodotti-selezionati::-webkit-scrollbar {
        width: 4px;
    }
    
    .prodotti-selezionati::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
    }
    
    .prodotti-selezionati::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.3);
        border-radius: 2px;
    }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen select-none">
    
    <!-- HEADER FISSO CON ORDINE SEMPRE VISIBILE -->
    <div class="header-ordine bg-gradient-to-r from-blue-500 to-cyan-400 text-white shadow-lg h-[200px]">
        <!-- Titolo e Sessione -->
        <div class="p-4 text-center border-b border-white/20">
            <div>
                    
                Cassa
            </div>
            
            <!-- Indicatore sessione -->
            <div id="indicatore-sessione" class="mt-2 bg-green-500 text-white px-3 py-1 rounded-full text-sm font-semibold hidden inline-block">
                🎉 <span id="nome-sessione-corrente"></span>
            </div>
            
            <!-- Alert nessuna sessione -->
            <div id="alert-nessuna-sessione" class="mt-2 bg-red-500 text-white px-3 py-1 rounded-full text-sm font-semibold hidden animate-pulse inline-block">
                ⚠️ Nessuna sessione attiva
            </div>
        </div>
        
        <!-- ORDINE CORRENTE SEMPRE VISIBILE -->
        <div class="p-4">
            <!-- Totale e Conferma -->
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-4">
                    <div class="text-2xl md:text-3xl font-bold">
                        Totale: <span id="totale-principale" class="text-yellow-300">€0.00</span>
                    </div>
                    <div class="text-sm opacity-75">
                        (<span id="items-count">0</span> prodotti)
                    </div>
                </div>
                
            </div>
            
            <!-- Lista Prodotti Selezionati Compatta -->
            <div id="prodotti-selezionati" class="prodotti-selezionati">
                <div id="lista-vuota" class="text-center text-white/70 py-2 text-sm">
                    Seleziona i prodotti qui sotto
                </div>
                <div id="lista-prodotti" class="space-y-1 hidden">
                    <!-- Prodotti selezionati caricati dinamicamente -->
                </div>
            </div>
        </div>
    </div>

    <!-- GRIGLIA PRODOTTI -->
    <div class="p-4">
        <div id="prodotti-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-3">
            <!-- Prodotti caricati dinamicamente -->
        </div>
    </div>

    <!-- Modal Nessuna Sessione -->
    <div id="modal-nessuna-sessione" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm mx-4 border-4 border-red-500">
            <div class="text-center">
                <div class="text-4xl mb-4">⚠️</div>
                <h3 class="text-xl font-bold text-red-600 mb-4">Nessuna Sessione Attiva</h3>
                <p class="text-gray-700 mb-6">
                    Non è possibile effettuare ordini senza una sessione attiva.
                </p>
                <div class="flex flex-col gap-3">
                    <button onclick="window.location.href='/config'" 
                        class="bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg font-bold">
                        ⚙️ Vai alla Configurazione
                    </button>
                    <button onclick="chiudiModalSessione()" 
                        class="bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg font-bold">
                        Chiudi
                    </button>
                </div>
            </div>
        </div>
    </div>


    <div class="flex justify-center z-50 mt-10 py-5  ">
        
        
        <button id="conferma-btn" onclick="confermaOrdine()" 
                class="bg-green-500 hover:bg-green-600 disabled:bg-gray-400 text-white px-40 py-10 rounded-lg font-bold text-lg">
                CONFERMA ✅
        </button>
        
        
    </div>

    <script>
    let carrello = [];
    let prodotti = [];
    let sessioneAttiva = null;

    // Toast notification system - SOLO PER ERRORI
    function showToast(message, type = 'error') {
        if (type !== 'error') return; // Mostra solo toast di errore
        
        const toast = document.createElement('div');
        toast.className = `toast fixed top-5 right-5 bg-red-500 text-white px-4 py-3 rounded-lg shadow-lg z-50 max-w-sm font-semibold text-sm`;
        toast.textContent = message;
        
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.transform = 'translateX(400px)';
            setTimeout(() => document.body.removeChild(toast), 300);
        }, 2500);
    }

    // ==== GESTIONE SESSIONE ====
    async function caricaSessioneAttiva() {
        try {
            const response = await fetch('/api/sessione_attiva');
            const sessione = await response.json();
            
            const indicatore = document.getElementById('indicatore-sessione');
            const alertNessuna = document.getElementById('alert-nessuna-sessione');
            const nomeSessione = document.getElementById('nome-sessione-corrente');
            
            if (sessione) {
                sessioneAttiva = sessione;
                nomeSessione.textContent = sessione.nome;
                indicatore.classList.remove('hidden');
                alertNessuna.classList.add('hidden');
            } else {
                sessioneAttiva = null;
                indicatore.classList.add('hidden');
                alertNessuna.classList.remove('hidden');
            }
        } catch (error) {
            console.error('Errore caricamento sessione:', error);
            sessioneAttiva = null;
        }
    }

    function verificaSessione() {
        if (!sessioneAttiva) {
            document.getElementById('modal-nessuna-sessione').classList.remove('hidden');
            return false;
        }
        return true;
    }

    function chiudiModalSessione() {
        document.getElementById('modal-nessuna-sessione').classList.add('hidden');
    }

    // ==== GESTIONE PRODOTTI ====
    async function caricaProdotti() {
        try {
            const response = await fetch('/api/prodotti');
            if (!response.ok) throw new Error('Errore nel caricamento prodotti');
            
            prodotti = await response.json();
            mostraProdotti();
        } catch (error) {
            console.error('Errore:', error);
            showToast('Errore nel caricamento prodotti', 'error');
        }
    }

    function mostraProdotti() {
        const grid = document.getElementById('prodotti-grid');
        grid.innerHTML = '';
        
        prodotti.forEach(prodotto => {
            const card = document.createElement('div');
            card.className = 'product-card bg-white rounded-xl p-3 md:p-4 text-center shadow-lg cursor-pointer border-2 border-transparent hover:border-blue-400 min-h-20 md:min-h-24 flex flex-col justify-center';
            
            // Rimuovo il controllo clickInProgress per permettere click rapidi
            card.addEventListener('click', (e) => {
                e.preventDefault();
                aggiungiAlCarrelloVeloce(prodotto);
            });
            
            // Aggiungo anche eventi touch per dispositivi mobili
            card.addEventListener('touchstart', (e) => {
                e.preventDefault();
                aggiungiAlCarrelloVeloce(prodotto);
            });
            
            card.innerHTML = `
                <div class="text-sm md:text-base font-bold text-gray-800 mb-1">${prodotto.nome}</div>
                <div class="text-lg md:text-xl font-bold text-blue-500">€${prodotto.prezzo.toFixed(2)}</div>
            `;
            
            grid.appendChild(card);
        });
    }

    function aggiungiAlCarrelloVeloce(prodotto) {
        if (!verificaSessione()) {
            return;
        }

        const esistente = carrello.find(item => item.id === prodotto.id);
        
        if (esistente) {
            esistente.quantita++;
        } else {
            carrello.push({
                id: prodotto.id,
                nome: prodotto.nome,
                prezzo: prodotto.prezzo,
                quantita: 1
            });
        }
        
        aggiornaOrdineVisibile();
        // Rimosso toast di successo
    }

    function aggiungiAlCarrello(prodotto) {
        aggiungiAlCarrelloVeloce(prodotto);
    }

    // ==== GESTIONE ORDINE VISIBILE ====
    function aggiornaOrdineVisibile() {
        const totalePrincipale = document.getElementById('totale-principale');
        const itemsCount = document.getElementById('items-count');
        const listaVuota = document.getElementById('lista-vuota');
        const listaProdotti = document.getElementById('lista-prodotti');
        const confermaBtn = document.getElementById('conferma-btn');
        
        let totale = 0;
        let totalItems = 0;
        
        // Calcola totali
        carrello.forEach(item => {
            totale += item.prezzo * item.quantita;
            totalItems += item.quantita;
        });
        
        // Aggiorna totale e contatore
        totalePrincipale.textContent = `€${totale.toFixed(2)}`;
        itemsCount.textContent = totalItems;
        
        // Mostra/nascondi lista
        if (carrello.length === 0) {
            listaVuota.classList.remove('hidden');
            listaProdotti.classList.add('hidden');
        } else {
            listaVuota.classList.add('hidden');
            listaProdotti.classList.remove('hidden');
        }
        
        // Aggiorna lista prodotti
        listaProdotti.innerHTML = '';
        carrello.forEach((item, index) => {
            const itemElement = document.createElement('div');
            itemElement.className = 'flex items-center justify-between bg-white/10 rounded-lg px-3 py-2 text-sm';
            
            itemElement.innerHTML = `
                <div class="flex-1 text-white">
                    <span class="font-semibold">${item.nome}</span>
                    <span class="opacity-75 ml-2">${item.quantita}x €${item.prezzo.toFixed(2)}</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-yellow-300 font-bold">€${(item.prezzo * item.quantita).toFixed(2)}</span>
                    <button onclick="rimuoviDalCarrello(${index})" 
                        class="delete-btn bg-red-500 hover:bg-red-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold">
                        ×
                    </button>
                </div>
            `;
            
            listaProdotti.appendChild(itemElement);
        });
        
        // Aggiorna pulsante conferma
        confermaBtn.disabled = carrello.length === 0 || !sessioneAttiva;
    }

    function rimuoviDalCarrello(index) {
        const prodotto = carrello[index];
        carrello.splice(index, 1);
        aggiornaOrdineVisibile();
        // Rimosso toast di warning
    }

    function svuotaCarrello() {
        if (carrello.length === 0) {
            // Rimosso toast di warning
            return;
        }
        
        carrello = [];
        aggiornaOrdineVisibile();
        // Rimosso toast di warning
    }

    async function confermaOrdine() {
        if (!verificaSessione()) return;

        if (carrello.length === 0) {
            showToast('Seleziona almeno un prodotto', 'error');
            return;
        }
        
        const confermaBtn = document.getElementById('conferma-btn');
        const originalText = confermaBtn.textContent;
        
        confermaBtn.disabled = true;
        
        try {
            const response = await fetch('/api/conferma_ordine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ carrello: carrello })
            });
            
            const result = await response.json();
            
            if (result.success) {
                // Rimosso toast di successo
                carrello = [];
                aggiornaOrdineVisibile();
            } else {
                showToast(result.message || 'Errore nella conferma ordine', 'error');
                if (result.message && result.message.includes('sessione')) {
                    caricaSessioneAttiva();
                }
            }
        } catch (error) {
            console.error('Errore:', error);
            showToast('Errore di connessione', 'error');
        } finally {
            confermaBtn.disabled = false;
            confermaBtn.textContent = originalText;
        }
    }

    // Mantieni funzioni originali per compatibilità
    function modificaQuantita(index, delta) {
        carrello[index].quantita += delta;
        
        if (carrello[index].quantita <= 0) {
            carrello.splice(index, 1);
            // Rimosso toast di warning
        }
        
        aggiornaOrdineVisibile();
    }

    function aggiornaCarrello() {
        aggiornaOrdineVisibile();
    }

    // ==== INIZIALIZZAZIONE ====
    document.addEventListener('DOMContentLoaded', function() {
        caricaSessioneAttiva();
        caricaProdotti();
        aggiornaOrdineVisibile();
        
        // Previeni zoom su doppio tap ma permetti click rapidi
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        // Previeni selezione testo
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });
    });

    // Auto-refresh
    setInterval(() => {
        caricaProdotti();
        caricaSessioneAttiva();
    }, 30000);
    </script>
</body>
</html>
