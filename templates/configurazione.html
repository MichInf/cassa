
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Configurazione Prodotti - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    /* Nasconde scrollbar ma mantiene funzionalità */
    .hide-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
    display: none;
    }
    
    /* Animazioni per mobile */
    @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-slide-in {
    animation: slideIn 0.3s ease-out;
    }

</head>
<body class="bg-gradient-to-br from-indigo-500 to-blue-600 min-h-screen select-none">
    <div class="min-h-screen flex flex-col">
    
    <!-- Header Responsive -->
    <div class="bg-gradient-to-r from-indigo-600 to-blue-500 text-white p-3 sm:p-5 flex-shrink-0 relative">
    <h1 class="text-xl sm:text-3xl font-bold text-center mb-1 sm:mb-2 drop-shadow-lg">⚙️ Configurazione</h1>
    
    <!-- Navigation - Responsive -->
    <div class="flex justify-between items-center mt-2">
    <a href="/" class="bg-white/20 hover:bg-white/30 px-2 sm:px-4 py-2 rounded-full transition-all duration-300 hover:-translate-y-1 flex items-center gap-1 sm:gap-2 text-white no-underline text-sm sm:text-base">
    ← <span class="hidden sm:inline">Torna alla Cassa</span><span class="sm:hidden">Cassa</span>
    </a>
    <a href="/statistiche" class="bg-white/20 hover:bg-white/30 px-2 sm:px-4 py-2 rounded-full transition-all duration-300 hover:-translate-y-1 flex items-center gap-1 sm:gap-2 text-white no-underline text-sm sm:text-base">
    📊 <span class="hidden sm:inline">Statistiche</span><span class="sm:hidden">Stats</span>
    </a>
    </div>
    </div>
    
    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
    
    <!-- Gestione Sessioni - Sempre in alto -->
    <div class="p-3 sm:p-5 border-b-2 border-white/20 flex-shrink-0 bg-white/10">
    <div class="bg-white rounded-xl shadow-lg border border-gray-200 p-4 sm:p-6">
    <h3 class="text-lg sm:text-xl font-bold text-gray-700 mb-4 text-center">🎉 Gestione Sessione Evento</h3>
    
    <!-- Sessione attiva -->
    <div id="sessione-attiva" class="hidden">
    <div class="bg-green-100 border border-green-300 rounded-lg p-3 sm:p-4 mb-4">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
    <div>
    <div class="text-base sm:text-lg font-bold text-green-800" id="nome-sessione-attiva"></div>
    <div class="text-sm sm:text-base text-green-600" id="info-sessione-attiva"></div>
    </div>
    <button onclick="chiudiSessione()" 
    class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-semibold transition-colors duration-200 text-sm sm:text-base">
    🛑 Chiudi Sessione
    </button>
    </div>
    </div>
    </div>
    
    <!-- Form nuova sessione -->
    <div id="form-nuova-sessione">
    <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 sm:p-4">
    <form id="sessione-form" class="flex flex-col sm:flex-row gap-3 sm:gap-4 sm:items-end">
    <div class="flex-1">
    <label class="block text-gray-600 font-semibold mb-2 text-sm sm:text-base">Nome Evento/Festa</label>
    <input type="text" id="nome-sessione" required placeholder="es. Festa di Compleanno Mario"
    class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-400 focus:outline-none transition-colors duration-200 text-sm sm:text-base">
    </div>
    <div class="flex-1">
    <label class="block text-gray-600 font-semibold mb-2 text-sm sm:text-base">Note (opzionale)</label>
    <input type="text" id="note-sessione" placeholder="es. 50 persone, giardino"
    class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-400 focus:outline-none transition-colors duration-200 text-sm sm:text-base">
    </div>
    <button type="submit" 
    class="bg-green-500 hover:bg-green-600 text-white px-4 sm:px-6 py-3 rounded-lg font-bold transition-colors duration-200 whitespace-nowrap text-sm sm:text-base">
    🚀 Avvia Sessione
    </button>
    </form>
    </div>
    </div>
    </div>
    </div>
    
    <!-- Layout Responsive per Gestione Prodotti -->
    
    <!-- Desktop Layout (lg e superiori) -->
    <div class="hidden lg:flex flex-1 overflow-hidden">
    <!-- Form Section Desktop -->
    <div class="w-1/3 p-5 border-r-2 border-white/20 overflow-y-auto bg-white/5">
    <div class="bg-white p-6 rounded-xl shadow-lg max-w-md mx-auto border border-gray-200">
    <h2 class="text-xl font-bold text-center text-gray-700 mb-6">Aggiungi/Modifica Prodotto</h2>
    
    <form id="prodotto-form-desktop" class="space-y-5">
    <input type="hidden" id="prodotto-id-desktop">
    
    <div>
    <label class="block text-gray-600 font-semibold mb-2">Nome Prodotto</label>
    <input type="text" id="nome-desktop" required 
    class="w-full p-4 border-2 border-gray-300 rounded-lg focus:border-blue-400 focus:outline-none transition-colors duration-200 text-lg focus:ring-2 focus:ring-blue-100">
    </div>
    
    <div>
    <label class="block text-gray-600 font-semibold mb-2">Prezzo (€)</label>
    <input type="number" id="prezzo-desktop" step="0.01" min="0" required 
    class="w-full p-4 border-2 border-gray-300 rounded-lg focus:border-blue-400 focus:outline-none transition-colors duration-200 text-lg focus:ring-2 focus:ring-blue-100">
    </div>
    
    <div class="flex items-center gap-3">
    <input type="checkbox" id="attivo-desktop" checked 
    class="w-5 h-5 text-blue-500 rounded focus:ring-blue-400">
    <label for="attivo-desktop" class="text-gray-600 font-semibold">Prodotto attivo</label>
    </div>
    
    <div class="flex gap-3">
    <button type="submit" 
    class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-4 rounded-lg font-bold transition-all duration-300 hover:-translate-y-1 hover:shadow-lg">
    💾 Salva
    </button>
    <button type="button" onclick="resetForm('desktop')" 
    class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-4 rounded-lg font-bold transition-all duration-300 hover:-translate-y-1 hover:shadow-lg">
    🔄 Reset
    </button>
    </div>
    </form>
    </div>
    </div>
    
    <!-- Lista Prodotti Desktop -->
    <div class="w-2/3 p-5 overflow-y-auto bg-white/5">
    <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
    <div class="bg-indigo-600 text-white p-5 text-center text-xl font-bold">
    📦 Lista Prodotti
    </div>
    <div id="prodotti-lista-desktop" class="divide-y divide-gray-200 hide-scrollbar">
    <!-- Prodotti caricati dinamicamente -->
    </div>
    </div>
    </div>
    </div>
    
    <!-- Mobile/Tablet Layout (sotto lg) -->
    <div class="lg:hidden flex-1 flex flex-col overflow-hidden">
    
    <!-- Tabs per Mobile -->
    <div class="bg-white border-b border-gray-200 flex">
    <button id="tab-form" onclick="switchTab('form')" 
    class="flex-1 py-3 px-4 text-center font-semibold transition-colors duration-200 border-b-2 border-blue-500 text-blue-600 bg-blue-50">
    ➕ Aggiungi Prodotto
    </button>
    <button id="tab-lista" onclick="switchTab('lista')" 
    class="flex-1 py-3 px-4 text-center font-semibold transition-colors duration-200 border-b-2 border-transparent text-gray-600 hover:text-gray-800">
    📦 Lista Prodotti
    </button>
    </div>
    
    <!-- Form Mobile -->
    <div id="content-form" class="flex-1 p-4 overflow-y-auto bg-white hide-scrollbar">
    <div class="max-w-md mx-auto">
    <h2 class="text-lg font-bold text-center text-gray-700 mb-6">Aggiungi/Modifica Prodotto</h2>
    
    <form id="prodotto-form-mobile" class="space-y-4">
    <input type="hidden" id="prodotto-id-mobile">
    
    <div>
    <label class="block text-gray-600 font-semibold mb-2 text-sm">Nome Prodotto</label>
    <input type="text" id="nome-mobile" required 
    class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-400 focus:outline-none transition-colors duration-200 text-base">
    </div>
    
    <div>
    <label class="block text-gray-600 font-semibold mb-2 text-sm">Prezzo (€)</label>
    <input type="number" id="prezzo-mobile" step="0.01" min="0" required 
    class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-400 focus:outline-none transition-colors duration-200 text-base">
    </div>
    
    <div class="flex items-center gap-3">
    <input type="checkbox" id="attivo-mobile" checked 
    class="w-4 h-4 text-blue-500 rounded focus:ring-blue-400">
    <label for="attivo-mobile" class="text-gray-600 font-semibold text-sm">Prodotto attivo</label>
    </div>
    
    <div class="flex gap-3 pt-4">
    <button type="submit" 
    class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg font-bold transition-colors duration-200">
    💾 Salva
    </button>
    <button type="button" onclick="resetForm('mobile')" 
    class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-3 rounded-lg font-bold transition-colors duration-200">
    🔄 Reset
    </button>
    </div>
    </form>
    </div>
    </div>
    
    <!-- Lista Mobile -->
    <div id="content-lista" class="flex-1 overflow-y-auto bg-white hidden hide-scrollbar">
    <div class="bg-indigo-600 text-white p-4 text-center font-bold sticky top-0 z-10">
    📦 Lista Prodotti
    </div>
    <div id="prodotti-lista-mobile" class="divide-y divide-gray-200">
    <!-- Prodotti caricati dinamicamente -->
    </div>
    </div>
    
    </div>
    </div>
    </div>

    <script>
    let prodotti = [];
    let editingId = null;
    let currentTab = 'form';
    let currentLayout = 'mobile'; // 'mobile' o 'desktop'

    // Rileva layout corrente
    function detectLayout() {
    currentLayout = window.innerWidth >= 1024 ? 'desktop' : 'mobile';
    }

    // Toast notifications
    function showToast(message, type = 'success') {
    const colors = {
    success: 'bg-emerald-500',
    error: 'bg-rose-500',
    warning: 'bg-amber-500',
    info: 'bg-blue-500'
    };
    
    const toast = document.createElement('div');
    toast.className = `fixed top-5 right-5 ${colors[type]} text-white px-4 sm:px-6 py-3 sm:py-4 rounded-lg shadow-lg z-50 max-w-sm font-semibold transform translate-x-full transition-transform duration-300 text-sm sm:text-base`;
    toast.textContent = message;
    
    document.body.appendChild(toast);
    
    setTimeout(() => toast.classList.remove('translate-x-full'), 100);
    setTimeout(() => {
    toast.classList.add('translate-x-full');
    setTimeout(() => document.body.removeChild(toast), 300);
    }, 3000);
    }

    // ==== GESTIONE TABS MOBILE ====

    function switchTab(tab) {
    currentTab = tab;
    
    const tabForm = document.getElementById('tab-form');
    const tabLista = document.getElementById('tab-lista');
    const contentForm = document.getElementById('content-form');
    const contentLista = document.getElementById('content-lista');
    
    if (tab === 'form') {
    tabForm.className = 'flex-1 py-3 px-4 text-center font-semibold transition-colors duration-200 border-b-2 border-blue-500 text-blue-600 bg-blue-50';
    tabLista.className = 'flex-1 py-3 px-4 text-center font-semibold transition-colors duration-200 border-b-2 border-transparent text-gray-600 hover:text-gray-800';
    contentForm.classList.remove('hidden');
    contentLista.classList.add('hidden');
    } else {
    tabForm.className = 'flex-1 py-3 px-4 text-center font-semibold transition-colors duration-200 border-b-2 border-transparent text-gray-600 hover:text-gray-800';
    tabLista.className = 'flex-1 py-3 px-4 text-center font-semibold transition-colors duration-200 border-b-2 border-blue-500 text-blue-600 bg-blue-50';
    contentForm.classList.add('hidden');
    contentLista.classList.remove('hidden');
    }
    }

    // ==== GESTIONE SESSIONI ====

    async function caricaSessione() {
    try {
    const response = await fetch('/api/sessione_attiva');
    if (!response.ok) throw new Error('Errore nel caricamento sessione');
    
    const sessione = await response.json();
    aggiornaInterfacciaSessione(sessione);
    } catch (error) {
    console.error('Errore:', error);
    showToast('Errore nel caricamento sessione', 'error');
    }
    }

    function aggiornaInterfacciaSessione(sessione) {
    const sessioneAttiva = document.getElementById('sessione-attiva');
    const formNuova = document.getElementById('form-nuova-sessione');
    
    if (sessione) {
    document.getElementById('nome-sessione-attiva').textContent = sessione.nome;
    const dataInizio = new Date(sessione.data_inizio).toLocaleString('it-IT');
    document.getElementById('info-sessione-attiva').textContent = `Avviata il ${dataInizio}${sessione.note ? ' - ' + sessione.note : ''}`;
    
    sessioneAttiva.classList.remove('hidden');
    formNuova.classList.add('hidden');
    } else {
    sessioneAttiva.classList.add('hidden');
    formNuova.classList.remove('hidden');
    }
    }

    // Crea nuova sessione
    document.getElementById('sessione-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const nome = document.getElementById('nome-sessione').value.trim();
    const note = document.getElementById('note-sessione').value.trim();
    
    if (!nome) {
    showToast('Nome sessione richiesto', 'error');
    return;
    }
    
    try {
    const response = await fetch('/api/crea_sessione', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nome, note })
    });
    
    const result = await response.json();
    
    if (result.success) {
    showToast(result.message, 'success');
    document.getElementById('sessione-form').reset();
    caricaSessione();
    } else {
    showToast(result.message, 'error');
    }
    } catch (error) {
    console.error('Errore:', error);
    showToast('Errore di connessione', 'error');
    }
    });

    // Chiudi sessione
    async function chiudiSessione() {
    const confirmDialog = document.createElement('div');
    confirmDialog.className = 'fixed inset-0 bg-black/30 flex items-center justify-center z-50 p-4';
    confirmDialog.innerHTML = `
    <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full border border-gray-200">
    <h3 class="text-lg font-bold text-gray-800 mb-4">🛑 Chiudi Sessione</h3>
    <p class="text-gray-600 mb-6 text-sm">Sei sicuro di voler chiudere la sessione attiva?</p>
    <p class="text-xs text-amber-600 mb-6">Potrai sempre consultare le statistiche in seguito.</p>
    <div class="flex gap-3">
    <button onclick="confermaChiusuraSessione()" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-semibold transition-colors duration-200 text-sm">
    Chiudi Sessione
    </button>
    <button onclick="annullaChiusuraSessione()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg font-semibold transition-colors duration-200 text-sm">
    Annulla
    </button>
    </div>
    </div>
    `;
    
    document.body.appendChild(confirmDialog);
    }

    async function confermaChiusuraSessione() {
    document.querySelector('.fixed.inset-0').remove();
    
    try {
    const response = await fetch('/api/chiudi_sessione', {
    method: 'POST'
    });
    
    const result = await response.json();
    
    if (result.success) {
    showToast(result.message, 'success');
    caricaSessione();
    } else {
    showToast(result.message, 'error');
    }
    } catch (error) {
    console.error('Errore:', error);
    showToast('Errore di connessione', 'error');
    }
    }

    function annullaChiusuraSessione() {
    document.querySelector('.fixed.inset-0').remove();
    }

    // ==== GESTIONE PRODOTTI ====

    async function caricaProdotti() {
    try {
    const response = await fetch('/api/tutti_prodotti');
    if (!response.ok) throw new Error('Errore nel caricamento');
    
    prodotti = await response.json();
    mostraProdotti();
    } catch (error) {
    console.error('Errore:', error);
    showToast('Errore nel caricamento prodotti', 'error');
    }
    }

    function mostraProdotti() {
    mostraProdottiDesktop();
    mostraProdottiMobile();
    }

    function mostraProdottiDesktop() {
    const lista = document.getElementById('prodotti-lista-desktop');
    lista.innerHTML = '';
    
    if (prodotti.length === 0) {
    lista.innerHTML = '<div class="p-8 text-center text-gray-500 text-lg">Nessun prodotto trovato</div>';
    return;
    }
    
    prodotti.forEach(prodotto => {
    const item = document.createElement('div');
    item.className = `p-5 hover:bg-gray-50 transition-colors duration-200 flex justify-between items-center ${!prodotto.attivo ? 'bg-gray-100' : ''}`;
    
    item.innerHTML = `
    <div class="flex-1">
    <div class="text-lg font-bold ${!prodotto.attivo ? 'text-gray-500 line-through' : 'text-gray-800'}">${prodotto.nome}</div>
    <div class="text-gray-600">€${prodotto.prezzo.toFixed(2)} 
    <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium ml-2 ${prodotto.attivo ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
    ${prodotto.attivo ? '✅ Attivo' : '❌ Disattivo'}
    </span>
    </div>
    </div>
    <div class="flex gap-2 items-center">
    <button onclick="toggleAttivo(${prodotto.id}, ${!prodotto.attivo})" 
    class="px-3 py-2 ${prodotto.attivo ? 'bg-orange-500 hover:bg-orange-600' : 'bg-green-500 hover:bg-green-600'} text-white rounded-lg transition-colors duration-200 text-sm font-semibold">
    ${prodotto.attivo ? '⏸️ Disattiva' : '▶️ Attiva'}
    </button>
    <button onclick="modificaProdotto(${prodotto.id})" 
    class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors duration-200">
    ✏️
    </button>
    <button onclick="eliminaProdotto(${prodotto.id})" 
    class="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-lg transition-colors duration-200">
    🗑️
    </button>
    </div>
    `;
    
    lista.appendChild(item);
    });
    }

    function mostraProdottiMobile() {
    const lista = document.getElementById('prodotti-lista-mobile');
    lista.innerHTML = '';
    
    if (prodotti.length === 0) {
    lista.innerHTML = '<div class="p-8 text-center text-gray-500">Nessun prodotto trovato</div>';
    return;
    }
    
    prodotti.forEach(prodotto => {
    const item = document.createElement('div');
    item.className = `p-4 ${!prodotto.attivo ? 'bg-gray-50' : 'bg-white'} border-l-4 ${prodotto.attivo ? 'border-green-500' : 'border-red-500'}`;
    
    item.innerHTML = `
    <div class="flex justify-between items-start mb-3">
    <div class="flex-1">
    <div class="text-base font-bold ${!prodotto.attivo ? 'text-gray-500 line-through' : 'text-gray-800'}">${prodotto.nome}</div>
    <div class="text-sm text-gray-600">€${prodotto.prezzo.toFixed(2)}</div>
    <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium mt-1 ${prodotto.attivo ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
    ${prodotto.attivo ? '✅ Attivo' : '❌ Disattivo'}
    </span>
    </div>
    </div>
    <div class="flex gap-2 flex-wrap">
    <button onclick="toggleAttivo(${prodotto.id}, ${!prodotto.attivo})" 
    class="px-3 py-2 ${prodotto.attivo ? 'bg-orange-500 hover:bg-orange-600' : 'bg-green-500 hover:bg-green-600'} text-white rounded-lg transition-colors duration-200 text-xs font-semibold">
    ${prodotto.attivo ? '⏸️ Disattiva' : '▶️ Attiva'}
    </button>
    <button onclick="modificaProdotto(${prodotto.id})" 
    class="px-3 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors duration-200 text-xs">
    ✏️ Modifica
    </button>
    <button onclick="eliminaProdotto(${prodotto.id})" 
    class="px-3 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-lg transition-colors duration-200 text-xs">
    🗑️ Elimina
    </button>
    </div>
    `;
    
    lista.appendChild(item);
    });
    }

    // Toggle stato attivo/disattivo
    async function toggleAttivo(id, nuovoStato) {
    try {
    const prodotto = prodotti.find(p => p.id === id);
    if (!prodotto) return;
    
    const response = await fetch(`/api/modifica_prodotto/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
    nome: prodotto.nome,
    prezzo: prodotto.prezzo,
    attivo: nuovoStato
    })
    });
    
    const result = await response.json();
    
    if (result.success) {
    showToast(`${prodotto.nome} ${nuovoStato ? 'attivato' : 'disattivato'}`, 'info');
    caricaProdotti();
    } else {
    showToast(result.message, 'error');
    }
    } catch (error) {
    console.error('Errore:', error);
    showToast('Errore di connessione', 'error');
    }
    }

    // Form submit handlers
    function setupFormHandlers() {
    // Desktop form
    document.getElementById('prodotto-form-desktop').addEventListener('submit', function(e) {
    handleFormSubmit(e, 'desktop');
    });
    
    // Mobile form
    document.getElementById('prodotto-form-mobile').addEventListener('submit', function(e) {
    handleFormSubmit(e, 'mobile');
    });
    }

    async function handleFormSubmit(e, layout) {
    e.preventDefault();
    
    const formData = {
    nome: document.getElementById(`nome-${layout}`).value.trim(),
    prezzo: parseFloat(document.getElementById(`prezzo-${layout}`).value),
    attivo: document.getElementById(`attivo-${layout}`).checked
    };
    
    if (!formData.nome || formData.prezzo <= 0) {
    showToast('Compila tutti i campi correttamente', 'error');
    return;
    }
    
    try {
    let response;
    if (editingId) {
    response = await fetch(`/api/modifica_prodotto/${editingId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(formData)
    });
    } else {
    response = await fetch('/api/aggiungi_prodotto', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(formData)
    });
    }
    
    const result = await response.json();
    
    if (result.success) {
    showToast(result.message, 'success');
    resetForm(layout);
    caricaProdotti();
    
    // Su mobile, torna alla lista dopo il salvataggio
    if (layout === 'mobile') {
    switchTab('lista');
    }
    } else {
    showToast(result.message, 'error');
    }
    } catch (error) {
    console.error('Errore:', error);
    showToast('Errore di connessione', 'error');
    }
    }

    // Modifica prodotto
    function modificaProdotto(id) {
    const prodotto = prodotti.find(p => p.id === id);
    if (!prodotto) return;
    
    editingId = id;
    
    // Popola entrambi i form
    ['desktop', 'mobile'].forEach(layout => {
    document.getElementById(`prodotto-id-${layout}`).value = id;
    document.getElementById(`nome-${layout}`).value = prodotto.nome;
    document.getElementById(`prezzo-${layout}`).value = prodotto.prezzo;
    document.getElementById(`attivo-${layout}`).checked = prodotto.attivo;
    
    const submitBtn = document.querySelector(`#prodotto-form-${layout} button[type="submit"]`);
    submitBtn.innerHTML = '💾 Aggiorna';
    });
    
    // Su mobile, vai al tab form
    if (currentLayout === 'mobile') {
    switchTab('form');
    }
    
    showToast('Modalità modifica attivata', 'info');
    }

    // Elimina prodotto
    async function eliminaProdotto(id) {
    const prodotto = prodotti.find(p => p.id === id);
    if (!prodotto) return;
    
    const confirmDialog = document.createElement('div');
    confirmDialog.className = 'fixed inset-0 bg-black/30 flex items-center justify-center z-50 p-4';
    confirmDialog.innerHTML = `
    <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full border border-gray-200">
    <h3 class="text-lg font-bold text-gray-800 mb-4">Conferma eliminazione</h3>
    <p class="text-gray-600 mb-4 text-sm">Sei sicuro di voler eliminare definitivamente "${prodotto.nome}"?</p>
    <p class="text-xs text-amber-600 mb-6">⚠️ Questa azione non può essere annullata!</p>
    <div class="flex gap-3">
    <button onclick="confermaEliminazione(${id})" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white py-2 rounded-lg font-semibold transition-colors duration-200 text-sm">
    Elimina
    </button>
    <button onclick="annullaEliminazione()" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg font-semibold transition-colors duration-200 text-sm">
    Annulla
    </button>
    </div>
    </div>
    `;
    
    document.body.appendChild(confirmDialog);
    }

    async function confermaEliminazione(id) {
    document.querySelector('.fixed.inset-0').remove();
    
    try {
    const response = await fetch(`/api/elimina_prodotto/${id}`, {
    method: 'DELETE'
    });
    
    const result = await response.json();
    
    if (result.success) {
    showToast(result.message, 'success');
    caricaProdotti();
    } else {
    showToast(result.message, 'error');
    }
    } catch (error) {
    console.error('Errore:', error);
    showToast('Errore di connessione', 'error');
    }
    }

    function annullaEliminazione() {
    document.querySelector('.fixed.inset-0').remove();
    }

    // Reset form
    function resetForm(layout) {
    if (layout) {
    // Reset specifico layout
    document.getElementById(`prodotto-form-${layout}`).reset();
    document.getElementById(`attivo-${layout}`).checked = true;
    const submitBtn = document.querySelector(`#prodotto-form-${layout} button[type="submit"]`);
    submitBtn.innerHTML = '💾 Salva';
    } else {
    // Reset entrambi
    ['desktop', 'mobile'].forEach(l => {
    document.getElementById(`prodotto-form-${l}`).reset();
    document.getElementById(`attivo-${l}`).checked = true;
    const submitBtn = document.querySelector(`#prodotto-form-${l} button[type="submit"]`);
    submitBtn.innerHTML = '💾 Salva';
    });
    }
    
    editingId = null;
    }

    // ==== INIZIALIZZAZIONE ====

    document.addEventListener('DOMContentLoaded', function() {
    detectLayout();
    setupFormHandlers();
    caricaProdotti();
    caricaSessione();
    
    // Gestione resize
    window.addEventListener('resize', function() {
    detectLayout();
    });
    
    // Previeni zoom su doppio tap
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
    const now = (new Date()).getTime();
    if (now - lastTouchEnd <= 300) {
    event.preventDefault();
    }
    lastTouchEnd = now;
    }, false);
    });
    </script>
</body>
</html>
