<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassa Festa</title>
    <script src="{{ url_for('static', filename='js/tailwind.min.js') }}"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">🍻 Cassa Festa</h1>
            <a href="/configurazione" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                ⚙️ Configurazione
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Prodotti -->
            <div class="lg:col-span-2">
                <h2 class="text-xl font-semibold mb-4">Prodotti</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    {% for prodotto in prodotti %}
                    <button onclick="aggiungiAlCarrello({{ prodotto[0] }}, '{{ prodotto[1] }}', {{ prodotto[2] }})"
                            class="bg-white hover:bg-blue-50 border-2 border-blue-200 hover:border-blue-400 rounded-lg p-4 text-center transition-all duration-200 shadow-sm hover:shadow-md">
                        <div class="font-semibold text-lg text-gray-800">{{ prodotto[1] }}</div>
                        <div class="text-blue-600 font-bold">€{{ "%.2f"|format(prodotto[2]) }}</div>
                    </button>
                    {% endfor %}
                </div>
            </div>

            <!-- Carrello -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-semibold mb-4">Carrello</h2>
                <div id="carrello-items" class="space-y-2 mb-4">
                    <p class="text-gray-500 text-center">Carrello vuoto</p>
                </div>
                
                <div class="border-t pt-4">
                    <div class="flex justify-between items-center text-xl font-bold">
                        <span>Totale:</span>
                        <span id="totale">€0.00</span>
                    </div>
                </div>
                
                <button id="conferma-btn" onclick="confermaOrdine()" 
                        class="w-full mt-4 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg disabled:bg-gray-300 disabled:cursor-not-allowed"
                        disabled>
                    Conferma Ordine
                </button>
            </div>
        </div>
    </div>

    <script>
        let carrello = [];

        function aggiungiAlCarrello(id, nome, prezzo) {
            const esistente = carrello.find(item => item.id === id);
            
            if (esistente) {
                esistente.quantita++;
            } else {
                carrello.push({
                    id: id,
                    nome: nome,
                    prezzo: prezzo,
                    quantita: 1
                });
            }
            
            aggiornaCarrello();
        }

        function rimuoviDalCarrello(id) {
            const index = carrello.findIndex(item => item.id === id);
            if (index > -1) {
                if (carrello[index].quantita > 1) {
                    carrello[index].quantita--;
                } else {
                    carrello.splice(index, 1);
                }
            }
            aggiornaCarrello();
        }

        function aggiornaCarrello() {
            const container = document.getElementById('carrello-items');
            const totaleEl = document.getElementById('totale');
            const confermaBtn = document.getElementById('conferma-btn');
            
            if (carrello.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center">Carrello vuoto</p>';
                totaleEl.textContent = '€0.00';
                confermaBtn.disabled = true;
                return;
            }
            
            let html = '';
            let totale = 0;
            
            carrello.forEach(item => {
                const subtotale = item.prezzo * item.quantita;
                totale += subtotale;
                
                html += `
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded">
                        <div>
                            <div class="font-medium">${item.nome}</div>
                            <div class="text-sm text-gray-600">€${item.prezzo.toFixed(2)} x ${item.quantita}</div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="font-bold">€${subtotale.toFixed(2)}</span>
                            <button onclick="rimuoviDalCarrello(${item.id})" 
                                    class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-sm">
                                -
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            totaleEl.textContent = `€${totale.toFixed(2)}`;
            confermaBtn.disabled = false;
        }

        function confermaOrdine() {
            if (carrello.length === 0) return;
            
            fetch('/api/conferma_ordine', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    carrello: carrello
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Ordine confermato!');
                    carrello = [];
                    aggiornaCarrello();
                } else {
                    alert('Errore nella conferma dell\'ordine');
                }
            })
            .catch(error => {
                console.error('Errore:', error);
                alert('Errore nella conferma dell\'ordine');
            });
        }
    </script>
</body>
</html>
